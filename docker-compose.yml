services:
  postgres:
    image: postgres:17
    container_name: gamerec-db
    environment:
      POSTGRES_DB: gamerec
      POSTGRES_USER: gamerec
      POSTGRES_PASSWORD: gamerec
    ports:
      - "5432:5432"
    volumes:
      - ./server/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
